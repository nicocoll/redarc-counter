<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedArc — Connected Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #ff4952;
    --red-dim: rgba(255,73,82,0.1);
    --bg:     #0a0808;
    --bg2:    #130d0d;
    --border: rgba(255,73,82,0.13);
    --muted:  rgba(255,255,255,0.22);
    --bright: rgba(255,255,255,0.92);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; overflow: hidden; color: var(--bright); }

  .grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(255,73,82,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,73,82,0.03) 1px,transparent 1px); background-size: 60px 60px; }
  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 50% at 35% 50%, rgba(255,73,82,0.055) 0%, transparent 68%); }
  .scanline { position: fixed; left: 0; right: 0; height: 2px; pointer-events: none; z-index: 1; background: linear-gradient(90deg,transparent,rgba(255,73,82,0.18),transparent); animation: scan 7s linear infinite; }
  @keyframes scan { 0%{top:-2px;opacity:0} 4%{opacity:1} 96%{opacity:1} 100%{top:100vh;opacity:0} }

  .corner { position: fixed; width: 20px; height: 20px; pointer-events: none; z-index: 3; }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl{top:22px;left:22px} .corner.tr{top:22px;right:22px;transform:scaleX(-1)} .corner.bl{bottom:22px;left:22px;transform:scaleY(-1)} .corner.br{bottom:22px;right:22px;transform:scale(-1)}

  .wordmark { position: fixed; top: 22px; left: 50%; transform: translateX(-50%); z-index: 5; display: flex; align-items: center; gap: 9px; opacity: 0; animation: fadeUp .7s .1s ease forwards; white-space: nowrap; }
  .wordmark svg { width: 26px; height: 26px; flex-shrink: 0; }
  .wordmark-text { font-family: 'Azeret Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; }
  .wordmark-text span { color: var(--red); }

  .layout { position: relative; z-index: 2; width: 100%; height: 100vh; display: grid; grid-template-columns: 1fr 1px 480px; padding-top: 64px; overflow: hidden; }

  /* ── left ── */
  .left { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; min-width: 0; }
  .label-top { font-family: 'Azeret Mono', monospace; font-size: 10px; font-weight: 300; letter-spacing: .3em; text-transform: uppercase; color: var(--red); display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp .7s .3s ease forwards; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink 2.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 8px var(--red)} 50%{opacity:.3;box-shadow:none} }

  .counter-row { display: flex; align-items: center; gap: 5px; opacity: 0; animation: fadeUp .7s .5s ease forwards; }
  .digit-block { position: relative; width: 108px; height: 144px; overflow: hidden; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
  .digit-block::before,.digit-block::after { content:''; position:absolute; left:0; right:0; height:40px; z-index:2; pointer-events:none; }
  .digit-block::before { top:0; background:linear-gradient(to bottom,var(--bg2) 10%,transparent); }
  .digit-block::after  { bottom:0; background:linear-gradient(to top,var(--bg2) 10%,transparent); }
  .d-line { position:absolute; top:50%; left:14px; right:14px; height:1px; background:var(--red); opacity:.18; z-index:3; transform:translateY(-50%); }
  .reel { position:absolute; top:0; left:0; right:0; display:flex; flex-direction:column; align-items:center; transition:transform .65s cubic-bezier(.23,1.04,.32,1); will-change:transform; }
  .d-face { width:100%; height:144px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Azeret Mono',monospace; font-size:84px; font-weight:800; line-height:1; }
  .sep { font-family:'Azeret Mono',monospace; font-size:52px; font-weight:300; color:var(--red); opacity:.3; margin-bottom:10px; line-height:1; align-self:flex-end; }

  .label-bottom { font-size:11px; font-weight:300; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; margin-top:1.75rem; opacity:0; animation:fadeUp .7s .65s ease forwards; }
  .rule { width:1px; height:44px; background:linear-gradient(to bottom,transparent,var(--border),transparent); margin:1.75rem 0; opacity:0; animation:fadeUp .7s .75s ease forwards; }
  .stat { display:flex; flex-direction:column; align-items:center; gap:6px; opacity:0; animation:fadeUp .7s .85s ease forwards; }
  .stat-val { font-family:'Azeret Mono',monospace; font-size:20px; font-weight:700; }
  .stat-lbl { font-size:10px; font-weight:300; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; }


  /* ── divider ── */
  .vdivider { background: var(--border); align-self: stretch; }

  /* ── right ── */
  .right { display:flex; flex-direction:column; height:100%; overflow:hidden; opacity:0; animation:fadeUp .7s 1s ease forwards; min-width:0; }
  .list-header { padding:1.25rem 1.5rem 1rem; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
  .list-title { font-family:'Azeret Mono',monospace; font-size:9px; font-weight:300; letter-spacing:.25em; text-transform:uppercase; color:var(--red); }
  .list-count { font-family:'Azeret Mono',monospace; font-size:9px; font-weight:300; color:var(--muted); }

  /* column headers */
  .list-cols { display:grid; grid-template-columns: 1fr 1.6fr 52px 56px; gap:0 .5rem; padding:.6rem 1.5rem; border-bottom:1px solid var(--border); flex-shrink:0; }
  .col-hdr { font-family:'Azeret Mono',monospace; font-size:7.5px; font-weight:300; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); cursor:pointer; user-select:none; display:flex; align-items:center; gap:4px; transition:color .2s; white-space:nowrap; }
  .col-hdr:hover { color:rgba(255,255,255,0.5); }
  .col-hdr.active { color:var(--red); }
  .col-hdr .sort-arrow { opacity:0; font-size:8px; transition:opacity .2s; }
  .col-hdr.active .sort-arrow { opacity:1; }
  .list-item { display:grid; grid-template-columns:1fr 1.6fr 52px 56px; gap:0 .5rem; align-items:center; padding:.6rem 1.5rem; border-bottom:1px solid rgba(255,73,82,0.05); transition:background .2s; }

  .list-scroll { flex:1; overflow-y:auto; padding:0; }
  .list-scroll::-webkit-scrollbar { width:3px; }
  .list-scroll::-webkit-scrollbar-track { background:transparent; }
  .list-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .list-item:hover { background:rgba(255,73,82,0.04); }
  .list-item.new-entry { animation:slideIn .5s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }

  .item-name { font-size:12px; font-weight:400; color:var(--bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-org  { font-size:11px; font-weight:300; color:rgba(255,255,255,0.6); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-date { font-family:'Azeret Mono',monospace; font-size:9px; font-weight:300; color:var(--muted); white-space:nowrap; }
  .item-   { display:flex; align-items:center; justify-content:center; }
  .-badge  { font-family:'Azeret Mono',monospace; font-size:8px; font-weight:700; letter-spacing:.1em; padding:2px 7px; border-radius:3px; }
  .-yes { background:rgba(255,73,82,0.15); color:var(--red); border:1px solid rgba(255,73,82,0.3); }
  .-no  { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.08); }

  /* ── footer ── */
  .footer { position:fixed; bottom:24px; left:0; right:0; display:flex; justify-content:center; z-index:5; }
  .pill { font-family:'Azeret Mono',monospace; font-size:9px; font-weight:300; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); background:rgba(19,13,13,.8); border:1px solid var(--border); border-radius:100px; padding:6px 20px; backdrop-filter:blur(10px); transition:color .4s; }
  .pill.live { color:var(--red); }

  @keyframes flash { 0%{opacity:1} 25%{opacity:.35} 100%{opacity:1} }
  .flash { animation:flash .45s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="grid"></div>
<div class="ambient"></div>
<div class="scanline"></div>

<div class="wordmark">
  <svg viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="11" stroke="#ff4952" stroke-width="1.5" stroke-dasharray="3 2.5" opacity="0.4"/><circle cx="13" cy="13" r="5.5" fill="#ff4952" opacity="0.9"/><circle cx="13" cy="13" r="2" fill="white" opacity="0.9"/></svg>
  <div class="wordmark-text">Red<span>Arc</span></div>
</div>

<div class="corner tl"><svg viewBox="0 0 20 20" fill="none"><path d="M1 12V1H12" stroke="rgba(255,73,82,0.28)" stroke-width="1"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 20 20" fill="none"><path d="M1 12V1H12" stroke="rgba(255,73,82,0.28)" stroke-width="1"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 20 20" fill="none"><path d="M1 12V1H12" stroke="rgba(255,73,82,0.28)" stroke-width="1"/></svg></div>
<div class="corner br"><svg viewBox="0 0 20 20" fill="none"><path d="M1 12V1H12" stroke="rgba(255,73,82,0.28)" stroke-width="1"/></svg></div>

<div class="layout">
  <div class="left">
    <div class="label-top"><span class="live-dot"></span>Conexions to Red Arc Platform App</div>
    <div class="counter-row" id="counterRow"></div>
    <div class="label-bottom">total connected apps</div>
    <div class="rule"></div>
    <div class="stat">
      <span class="stat-val" id="statTime">—</span>
      <span class="stat-lbl">last updated</span>
    </div>
  </div>

  <div class="vdivider"></div>

  <div class="right">
    <div class="list-header">
      <div class="list-title">connected users</div>
      <div class="list-count" id="listCount"></div>
    </div>
    <div class="list-cols">
      <div class="col-hdr" data-sort="name">contact <span class="sort-arrow">↕</span></div>
      <div class="col-hdr" data-sort="org">organisation <span class="sort-arrow">↕</span></div>
      <div class="col-hdr" data-sort="date">date <span class="sort-arrow">↕</span></div>
      <div class="col-hdr" data-sort="hs">new contact <span class="sort-arrow">↕</span></div>
    </div>
    <div class="list-scroll" id="listScroll"></div>
  </div>
</div>

<div class="footer"><div class="pill" id="pill">initialising…</div></div>

<script>
const DATA_URL = 'https://api.github.com/repos/nicocoll/redarc-counter/contents/data.json';
const POLL_INTERVAL = 30000;

let currentCount = null;
let currentCustomers = [];
let slotCount = 0;

function buildSlots(n) {
  const needed = Math.max(n, 3);
  if (needed === slotCount) return;
  slotCount = needed;
  const row = document.getElementById('counterRow');
  row.innerHTML = '';
  for (let i = 0; i < needed; i++) {
    if (i > 0 && (needed - i) % 3 === 0) { const s = document.createElement('div'); s.className='sep'; s.textContent=','; row.appendChild(s); }
    const block = document.createElement('div'); block.className='digit-block';
    const line = document.createElement('div'); line.className='d-line'; block.appendChild(line);
    const reel = document.createElement('div'); reel.className='reel'; reel.id='reel'+i;
    for (let d=0;d<=9;d++) { const face=document.createElement('div'); face.className='d-face'; face.textContent=d; reel.appendChild(face); }
    block.appendChild(reel); row.appendChild(block);
  }
}
function setDigit(i,d) { const r=document.getElementById('reel'+i); if(r) r.style.transform=`translateY(-${d*144}px)`; }
function renderCount(n) {
  const str=String(Math.max(0,Math.round(n))); const len=Math.max(str.length,3);
  buildSlots(len); const padded=str.padStart(len,'0');
  for(let i=0;i<len;i++) setDigit(i,parseInt(padded[i]));
}
function animateTo(target) {
  const start=currentCount??0;
  if(target===start&&currentCount!==null) return;
  const diff=target-start; const steps=Math.min(Math.abs(diff),30);
  if(steps===0){renderCount(target);currentCount=target;return;}
  let step=0;
  const tick=()=>{ step++; const e=step/steps; const eased=e<0.5?2*e*e:-1+(4-2*e)*e; renderCount(Math.round(start+diff*eased)); if(step<steps) setTimeout(tick,80); else currentCount=target; };
  tick();
}
function flashRow() {
  const row=document.getElementById('counterRow');
  row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash');
  row.addEventListener('animationend',()=>row.classList.remove('flash'),{once:true});
}
function formatDate(d) {
  const [y,m,day]=d.split('-');
  return `${parseInt(day)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]}`;
}
let sortKey = 'date';
let sortDir = 1; // 1 = asc, -1 = desc

function sortCustomers(customers) {
  return [...customers].sort((a, b) => {
    let av, bv;
    if (sortKey === 'name')  { av = (a.first+' '+a.last).toLowerCase(); bv = (b.first+' '+b.last).toLowerCase(); }
    if (sortKey === 'org')   { av = a.org.toLowerCase(); bv = b.org.toLowerCase(); }
    if (sortKey === 'date')  { av = a.date; bv = b.date; }
    if (sortKey === 'hs')    { av = String(a.hs||'').trim().toUpperCase(); bv = String(b.hs||'').trim().toUpperCase(); }
    if (av < bv) return -1 * sortDir;
    if (av > bv) return 1 * sortDir;
    return 0;
  });
}

function updateSortHeaders() {
  document.querySelectorAll('.col-hdr').forEach(h => {
    const isActive = h.dataset.sort === sortKey;
    h.classList.toggle('active', isActive);
    const arrow = h.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = isActive ? (sortDir === 1 ? '↑' : '↓') : '↕';
  });
}

function renderList(customers, newOrgs=[]) {
  const scroll=document.getElementById('listScroll');
  scroll.innerHTML='';
  const sorted = sortCustomers(customers);
  sorted.forEach(c=>{
    const item=document.createElement('div');
    item.className='list-item'+(newOrgs.includes(c.org)?' new-entry':'');
    const hsRaw = String(c.hs || '').trim().toUpperCase();
    const hs = hsRaw === 'YES';
    const hsClass = hs ? 'hs-yes' : 'hs-no';
    const hsLabel = hs ? 'YES' : 'NO';
    item.innerHTML = '<div class="item-name">' + c.first + ' ' + c.last + '</div>' +
      '<div class="item-org">' + c.org + '</div>' +
      '<div class="item-date">' + formatDate(c.date) + '</div>' +
      '<div class="item-hs"><span class="hs-badge ' + hsClass + '">' + hsLabel + '</span></div>';
    scroll.appendChild(item);
  });
  document.getElementById('listCount').textContent=customers.length+' total';
}

function initSortHeaders() {
  document.querySelectorAll('.col-hdr[data-sort]').forEach(h => {
    h.addEventListener('click', () => {
      const key = h.dataset.sort;
      if (sortKey === key) sortDir *= -1;
      else { sortKey = key; sortDir = key === 'date' ? -1 : 1; }
      updateSortHeaders();
      renderList(currentCustomers);
    });
  });
  // default: date descending (newest first)
  sortKey = 'date'; sortDir = -1;
  updateSortHeaders();
}
function setPill(msg,red){const p=document.getElementById('pill');p.textContent=msg;p.classList.toggle('live',!!red);}
function timeNow(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}

async function poll() {
  try {
    const res=await fetch(DATA_URL,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok) throw new Error(res.status);
    const ghData=await res.json();
    const decoded=atob(ghData.content.replace(/\n/g,''));
    const data=JSON.parse(decoded);
    const customers=data.customers||[];
    const newCount=parseInt(data.count??customers.length);
    const prevOrgs=new Set(currentCustomers.map(c=>c.org));
    const newOrgs=customers.filter(c=>!prevOrgs.has(c.org)).map(c=>c.org);
    const changed=currentCount!==null&&newCount!==currentCount;
    if(changed) flashRow();
    animateTo(newCount); renderList(customers,newOrgs);
    currentCustomers=customers;
    document.getElementById('statTime').textContent=timeNow();
    setPill(changed?'new connection detected · '+timeNow():'live · synced '+timeNow(),true);
    if(changed) setTimeout(()=>setPill('live · synced '+timeNow(),true),4000);
  } catch(err) {
    setPill('unreachable — retrying',false);
    console.error('RedArc counter:',err);
  }
}

buildSlots(3); renderCount(0); setPill('connecting…');
initSortHeaders();


poll(); setInterval(poll,POLL_INTERVAL);
</script>
</body>
</html>
